name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Configure yc and get kubeconfig
        env:
          YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          echo "$YC_SA_KEY" > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set folder-id "$YC_FOLDER_ID"
          yc managed-kubernetes cluster get-credentials \
            --name "${{ vars.YC_CLUSTER_NAME }}" \
            --external --force

      - name: Login to registry
        run: |
          docker login cr.yandex \
            --username json_key \
            --password-stdin <<< '${{ secrets.YC_SA_KEY }}'

      - name: Build and push images
        env:
          API_IMAGE: ${{ vars.REGISTRY_ENDPOINT }}/deployments-service-api:${{ github.ref_name }}
          WORKER_IMAGE: ${{ vars.REGISTRY_ENDPOINT }}/deployments-service-worker:${{ github.ref_name }}
        run: |
          docker build -t "$API_IMAGE" -f Dockerfile.api .
          docker push "$API_IMAGE"
          docker build -t "$WORKER_IMAGE" -f Dockerfile.worker .
          docker push "$WORKER_IMAGE"

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm upgrade --install deployments-service ./charts/deployments-service \
            --namespace apps-deployer \
            --set image.api.repository="${{ vars.REGISTRY_ENDPOINT }}/deployments-service-api" \
            --set image.api.tag="${{ github.ref_name }}" \
            --set image.worker.repository="${{ vars.REGISTRY_ENDPOINT }}/deployments-service-worker" \
            --set image.worker.tag="${{ github.ref_name }}" \
            --set secrets.dbPassword="${{ secrets.PG_DEPLOYMENTS_PASSWORD }}" \
            --set secrets.dbAdminPassword="${{ secrets.PG_DEPLOYMENTS_ADMIN_PASSWORD }}" \
            --set secrets.jwtSecret="${{ secrets.JWT_SECRET }}" \
            --set secrets.redisPassword="${{ secrets.REDIS_PASSWORD }}" \
            --set secrets.ghWebhookSecret="${{ secrets.GH_WEBHOOK_SECRET }}" \
            --set server.baseUrl="${{ vars.DEPLOYMENTS_BASE_URL }}" \
            --set server.frontendUrl="${{ vars.FRONTEND_URL }}" \
            --set registry.url="${{ vars.REGISTRY_ENDPOINT }}" \
            --set deploy.baseDomain="${{ vars.APP_BASE_DOMAIN }}" \
            --set ingress.host="${{ vars.DEPLOYMENTS_HOST }}" \
            --wait --timeout 120s
